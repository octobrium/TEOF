name: guardrails
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Verify capsule hashes
        run: scripts/ci/check_hashes.sh
      - name: Enforce append-only policy
        run: scripts/ci/check_append_only.sh origin/main
      - name: Consensus tooling smoke test
        run: scripts/ci/consensus_smoke.sh
      - name: Validate consensus receipts
        run: scripts/ci/check_consensus_receipts.py
      - name: Run readability guard
        run: python3 -m tools.maintenance.readability_guard
      - name: Validate readability summary
        run: scripts/ci/check_readability.py
      - name: Enforce policy checks
        run: scripts/policy_checks.sh
      - name: Fractal conformance check
        run: scripts/ci/check_fractal_conformance.py
      - name: Guard tier manifest check
        run: python3 scripts/ci/check_guard_tiers.py
      - name: Preflight telemetry summary
        run: python3 tools/usage/preflight_summary.py --window-hours 168 --output artifacts/telemetry/preflight-summary.json
      - name: Capability inventory guard
        run: PYTHONPATH=. python3 scripts/ci/check_capability_inventory.py
      - name: Automation inventory guard
        run: PYTHONPATH=. python3 scripts/ci/check_automation_inventory.py
      - name: Quickstart smoke test
        run: scripts/ci/quickstart_smoke.sh
      - name: Systemic ratchet guard
        run: PYTHONPATH=. python3 scripts/ci/check_ratchet_velocity.py
      - name: Upload consensus artifacts
        uses: actions/upload-artifact@v4
        with:
          name: consensus-smoke
          path: |
            artifacts/consensus/ci-ledger-smoke.jsonl
            artifacts/consensus/ci-consensus-smoke.jsonl
            artifacts/consensus/ci-dashboard.txt
            artifacts/telemetry/preflight-summary.json
